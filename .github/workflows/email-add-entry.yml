name: Add Entry from Email

on:
  repository_dispatch:
    types: [add-entry]

permissions:
  contents: write
  pull-requests: write

jobs:
  add-entry:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Process entry from email
        id: process
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISBN: ${{ github.event.client_payload.isbn }}
          READDATE: ${{ github.event.client_payload.readDate }}
        run: |
          chmod +x .github/scripts/add-entry.sh
          set +e
          OUTPUT=$(.github/scripts/add-entry.sh "$ISBN" "$READDATE" 2>&1)
          EXIT_CODE=$?
          set -e

          if [ $EXIT_CODE -eq 0 ]; then
            echo "$OUTPUT" | grep -E "^(citation_key|safe_key)=" >> $GITHUB_OUTPUT
          elif echo "$OUTPUT" | grep -q "duplicate=true"; then
            echo "duplicate=true" >> $GITHUB_OUTPUT
          else
            echo "Script failed:"
            echo "$OUTPUT"
            exit $EXIT_CODE
          fi

      - name: Report duplicate (skip)
        if: steps.process.outputs.duplicate == 'true'
        run: |
          echo "Entry already exists in custom_info.yaml, skipping"

      - name: Report failure
        if: failure()
        run: |
          echo "Failed to process entry from email"
          echo "ISBN: ${{ github.event.client_payload.isbn }}"
          echo "ReadDate: ${{ github.event.client_payload.readDate }}"
