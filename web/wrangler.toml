#:schema node_modules/wrangler/config-schema.json
name = "kotetsu"
type = "javascript"
compatibility_date = "2024-12-16"
compatibility_flags = ["nodejs_compat"]

[build]
command = "pnpm build"
cwd = "."
watch_paths = ["src/**/*.ts", "src/**/*.svelte"]

[build.upload]
format = "modules"
main = ".svelte-kit/cloudflare/index.js"
